<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>System Awakening</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css"/>

  <!-- story.js must load before engine.js (engine references storyNodes) -->
  <script src="js/story.js"></script>
  <script src="js/engine.js" defer></script>
</head>
<body>

<div id="app">
  <header id="game-header">
    <div id="game-title">System Awakening</div>
    <div id="chapter-title">—</div>
    <div style="display:flex;align-items:center;gap:12px;">
      <button id="restart-btn" title="Restart game">↺ Restart</button>
      <button id="status-toggle" aria-label="Toggle status panel">◈ Status</button>
    </div>
  </header>

  <main id="game-main">

    <!-- Narrative panel: story text + choices scroll together -->
    <section id="narrative-panel">
      <div id="narrative-content">
        <!-- #choice-area is a sibling inside the scroll container so choices
             appear naturally below the text rather than pinned to the bottom -->
        <div id="choice-area"></div>
      </div>
    </section>

    <!-- Status sidebar -->
    <aside id="status-panel">
      <div class="status-section">
        <div class="status-label">Operative</div>
        <div id="status-name" class="status-value">—</div>
        <div id="status-class" class="status-value status-class-badge">Unclassed</div>
      </div>

      <div class="status-section">
        <div class="status-row">
          <span class="status-label">Level</span>
          <span id="status-level" class="status-value accent-cyan">0</span>
        </div>
        <div class="status-row">
          <span class="status-label">XP</span>
          <span id="status-xp" class="status-value">0 / 100</span>
        </div>
        <div class="xp-bar-track">
          <div id="xp-bar-fill" class="xp-bar-fill" style="width:0%"></div>
        </div>
      </div>

      <div class="status-section">
        <div class="status-row">
          <span class="status-label">HP</span>
          <span id="status-hp" class="status-value accent-green">Healthy</span>
        </div>
        <div class="status-row">
          <span class="status-label">Mana</span>
          <span id="status-mana" class="status-value accent-cyan">100 / 100</span>
        </div>
      </div>

      <div class="status-section">
        <div class="status-label status-section-header">Stats</div>
        <div class="stat-grid">
          <div class="stat-row"><span class="stat-name">FOR</span><span id="stat-fortitude"  class="stat-val">10</span></div>
          <div class="stat-row"><span class="stat-name">PER</span><span id="stat-perception" class="stat-val">10</span></div>
          <div class="stat-row"><span class="stat-name">STR</span><span id="stat-strength"   class="stat-val">10</span></div>
          <div class="stat-row"><span class="stat-name">AGI</span><span id="stat-agility"    class="stat-val">10</span></div>
          <div class="stat-row"><span class="stat-name">MP</span> <span id="stat-magicPower" class="stat-val">10</span></div>
          <div class="stat-row"><span class="stat-name">MR</span> <span id="stat-magicRegen" class="stat-val">10</span></div>
        </div>
      </div>

      <div class="status-section">
        <div class="status-label status-section-header">Skills</div>
        <ul id="skills-list" class="tag-list">
          <li class="tag-empty">None</li>
        </ul>
      </div>

      <div class="status-section">
        <div class="status-label status-section-header">Inventory</div>
        <ul id="inventory-list" class="tag-list">
          <li class="tag-empty">Empty</li>
        </ul>
      </div>
    </aside>

  </main>
</div>

<!-- Level-up overlay (interactive stat allocation) -->
<div id="levelup-overlay" class="overlay hidden">
  <div class="overlay-box">
    <div class="overlay-title">◈ LEVEL UP ◈</div>
    <div id="levelup-content"></div>
    <button id="levelup-close" class="overlay-btn">Confirm</button>
  </div>
</div>

<!-- Death / Ending overlay -->
<div id="ending-overlay" class="overlay hidden">
  <div class="overlay-box" id="ending-box">
    <div id="ending-icon"></div>
    <div id="ending-title" class="overlay-title"></div>
    <div id="ending-content"></div>
    <div id="ending-stats"></div>
    <button id="ending-action-btn" class="overlay-btn"></button>
  </div>
</div>

</body>
</html>
